name: Rubika Code Assistant

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Install Python packages
        run: pip install requests llama-cpp-python

      - name: Cache model file
        id: cache-model
        uses: actions/cache@v3
        with:
          path: model.gguf
          key: deepseek-coder-1.3b-q4km

      - name: Download model if not cached
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          wget -O model.gguf https://huggingface.co/TheBloke/deepseek-coder-1.3B-instruct-GGUF/resolve/main/deepseek-coder-1.3b-instruct.Q4_K_M.gguf

      - name: Run bot
        env:
          RUBIKA_TOKEN: ${{ secrets.RUBIKA_TOKEN }}
          # PROXY_URL: ${{ secrets.PROXY_URL }}   # optional
        run: python code_bot.py
